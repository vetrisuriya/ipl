<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPL Bowling Economy Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Bowling Economy Calculator</h1>
      <p>Calculate economy rate for a bowler from runs conceded and overs bowled.</p>
      <nav class="nav-menu">
        <a href="index.html">Home</a>
        <a href="teams.html">Teams</a>
        <a href="nrr.html">NRR</a>
        <a href="strike.html">Strike Rate</a>
        <a href="economy.html" class="active">Economy</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="panel">
      <form id="economyForm" class="tool-form">
        <label>Runs conceded:<input type="number" id="economyRuns" min="0" value="0" /></label>
        <label>Overs bowled:<input type="number" id="economyOvers" min="0" step="0.1" value="0" /></label>
        <button type="submit" class="btn">Calculate Economy</button>
      </form>
      <div id="economyResult" class="result-box"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Bowling Economy calculator page.</p>
    </div>
  </footer>
  <script src="script.js"></script>
</body>
</html>
